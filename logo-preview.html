<!DOCTYPE html>
<html lang="en">
<head>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Outfit',sans-serif; padding: 40px 24px; background: #e8e6e1; }
.section { max-width: 700px; margin: 0 auto 48px; }
.section h2 { font-size: 11px; font-weight: 500; color: #999; margin-bottom: 16px; letter-spacing: 2px; text-transform: uppercase; }
.card { padding: 32px; border-radius: 12px; margin-bottom: 12px; }
.light-bg { background: #f7f5f0; }
.dark-bg { background: #141410; }
.card img { display: block; }
.nav-mock { max-width: 700px; margin: 0 auto 48px; }
.nav-mock h2 { font-size: 11px; font-weight: 500; color: #999; margin-bottom: 16px; letter-spacing: 2px; text-transform: uppercase; }
.bar { background: #fff; border: 1px solid #ddd; border-radius: 12px; padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; }
.bar img { height: 36px; }
.bar-dark { background: #141410; border: 1px solid #2e2e28; border-radius: 12px; padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; margin-top: 12px; }
.bar-dark img { height: 36px; }
.footer-mock { max-width: 700px; margin: 0 auto 48px; }
.footer-mock h2 { font-size: 11px; font-weight: 500; color: #999; margin-bottom: 16px; letter-spacing: 2px; text-transform: uppercase; }
.footer-light { background: #ede9e3; padding: 24px; border-radius: 12px; }
.footer-dark { background: #1c1c18; padding: 24px; border-radius: 12px; margin-top: 12px; }
.favicon-row { max-width: 700px; margin: 0 auto 48px; }
.favicon-row h2 { font-size: 11px; font-weight: 500; color: #999; margin-bottom: 16px; letter-spacing: 2px; text-transform: uppercase; }
.favicon-sizes { display: flex; align-items: end; gap: 24px; background: #fff; padding: 24px; border-radius: 12px; border: 1px solid #ddd; }
.favicon-item { text-align: center; }
.favicon-item img { display: block; margin: 0 auto 6px; border: 1px solid #eee; border-radius: 2px; }
.favicon-item span { font-size: 10px; color: #999; }
</style>
</head>
<body>

<div class="section">
  <h2>Light Mode ÃƒÂ¢Ã¢â€šÂ¬Ã¢â‚¬Â Full Size</h2>
  <div class="card light-bg"><img src="logo.svg" alt="BimaNiti" width="320"></div>
</div>

<div class="section">
  <h2>Dark Mode ÃƒÂ¢Ã¢â€šÂ¬Ã¢â‚¬Â Full Size</h2>
