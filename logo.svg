<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 85">
  <style>
    .bar { fill: #4a6741; }
    .brand { fill: #1a1a1a; }
    .rule { stroke: #1a1a1a; }
    .tagline { fill: #6a6a6a; }
    @media (prefers-color-scheme: dark) {
      .bar { fill: #8aaa7a; }
      .brand { fill: #e8e4dc; }
      .rule { stroke: #e8e4dc; }
      .tagline { fill: #8a8680; }
    }
  </style>
  <rect x="0" y="12" width="5" height="46" rx="2.5" class="bar"/>
  <text x="22" y="48" class="brand" font-family="Georgia,'Times New Roman',serif" font-size="40" font-weight="700" letter-spacing="-0.5">BimaNiti</text>
  <line x1="0" y1="61" x2="265" y2="61" class="rule" stroke-width="1.5" stroke-linecap="round"/>
  <text x="22" y="78" class="tagline" font-family="Arial,Helvetica,sans-serif" font-size="11" letter-spacing="3">INSURANCE &amp; MARKET ANALYSIS</text>
</svg>
